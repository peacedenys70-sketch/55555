<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IFRI MentorLink – Messagerie</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/messenger.css') }}" />
  <style>
    .chat-bubble { max-width:70%;padding:0.6rem 1rem;border-radius:18px;margin-bottom:0.4rem;font-size:0.88rem;line-height:1.5; }
    .chat-bubble.me { background:#7c3aed;color:#fff;margin-left:auto;border-bottom-right-radius:4px; }
    .chat-bubble.other { background:#f3f4f6;color:#111827;margin-right:auto;border-bottom-left-radius:4px; }
    #chatMessages { height:calc(100vh - 300px);overflow-y:auto;padding:1rem;display:flex;flex-direction:column; }
    .conv-item { cursor:pointer;padding:0.75rem;border-radius:12px;border:1px solid #e5e7eb;margin-bottom:0.5rem;transition:background 0.15s; }
    .conv-item:hover, .conv-item.active { background:#ede9fe; }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <a href="/dashboard" class="sidebar-logo">
      <img src="/static/img/logo-mentorlink.png" alt="IFRI MentorLink" class="sidebar-logo-img">
      <div><div class="sidebar-logo-text">IFRI MentorLink</div><div class="sidebar-logo-sub">UAC – Bénin</div></div>
    </a>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Menu</div>
      <a href="/dashboard" class="nav-item-link"><i class="bi bi-grid-1x2 nav-icon"></i> Tableau de bord</a>
      <a href="/annonces"  class="nav-item-link"><i class="bi bi-megaphone nav-icon"></i> Annonces</a>
      <div class="sidebar-section-label">Social</div>
      <a href="/messages"  class="nav-item-link active"><i class="bi bi-chat-dots nav-icon"></i> Messagerie</a>
      <a href="/matching"  class="nav-item-link"><i class="bi bi-people nav-icon"></i> Mes matchs</a>
      <a href="/planning"  class="nav-item-link"><i class="bi bi-calendar-week nav-icon"></i> Planning</a>
      <div class="sidebar-section-label">Compte</div>
      <a href="/profil"    class="nav-item-link"><i class="bi bi-person-circle nav-icon"></i> Profil</a>
      <a href="#" id="logoutBtn" class="nav-item-link" style="color:#ef4444;"><i class="bi bi-box-arrow-left nav-icon"></i> Déconnexion</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/profil" class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">?</div>
        <div>
          <div class="sidebar-user-name" id="sidebarName">…</div>
        </div>
      </a>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <header class="topbar">
    <div class="d-flex align-items-center gap-3">
      <button class="topbar-hamburger" id="hamburgerBtn"><i class="bi bi-list"></i></button>
      <span class="topbar-title">Messagerie</span>
    </div>
  </header>

  <main class="main-content">
    <div class="row g-3" style="height:calc(100vh - 120px);">

      <!-- Liste des conversations -->
      <div class="col-md-4">
        <h6 class="fw-700 mb-3">Conversations</h6>
        <div id="convList">
          <p class="text-muted text-center py-3">
            <span class="spinner-border spinner-border-sm me-2"></span>Chargement…
          </p>
        </div>
      </div>

      <!-- Zone de chat -->
      <div class="col-md-8">
        <div id="chatZone" class="card border-0 shadow-sm h-100" style="border-radius:16px;display:none;flex-direction:column;">
          <div class="card-header bg-white border-0 rounded-top" style="border-radius:16px 16px 0 0;">
            <strong id="chatPartnerName">Conversation</strong>
          </div>
          <div id="chatMessages" class="flex-grow-1"></div>
          <div class="card-footer bg-white border-0 d-flex gap-2">
            <input type="text" id="msgInput" class="form-control" placeholder="Votre message…"
              style="border-radius:999px;" />
            <button class="btn btn-mentorlink" id="btnSend" style="border-radius:999px;padding:0 1.2rem;">
              <i class="bi bi-send-fill"></i>
            </button>
          </div>
        </div>
        <div id="chatEmpty" class="d-flex align-items-center justify-content-center h-100 text-muted flex-column gap-2">
          <i class="bi bi-chat-dots" style="font-size:3rem;opacity:0.3;"></i>
          <span>Sélectionnez une conversation</span>
        </div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    if (!localStorage.getItem('access_token')) window.location.href = '/login';
    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('access_token')}` };
    }

    document.getElementById('hamburgerBtn').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
    document.getElementById('sidebarOverlay').addEventListener('click', () => document.getElementById('sidebar').classList.remove('open'));
    document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); localStorage.clear(); window.location.href = '/login'; });

    let currentUser = null;
    let currentConvId = null;
    let pollInterval = null;

    // Charger l'utilisateur
    fetch('/users/me', { headers: authHeaders() }).then(r => r.json()).then(u => {
      currentUser = u;
      const _ini = ((u.prenom||'?')[0]+(u.nom||'?')[0]).toUpperCase();
      const _sa = document.getElementById('sidebarAvatar');
      if (u.photo) { _sa.innerHTML = `<img src="${u.photo}" alt="avatar">`; }
      else { _sa.textContent = _ini; }
      document.getElementById('sidebarName').textContent   = `${u.prenom} ${u.nom}`;
       const convIdFromUrl = new URLSearchParams(window.location.search).get('conv');
      if (convIdFromUrl) {
        openConversation(parseInt(convIdFromUrl), 'Conversation');
      }
    });

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // NOTE : Le backend n'a pas de route GET /matching/ pour lister
    // les matchings d'un utilisateur. On affiche ici un message
    // et les conversations sont accessibles via l'ID de conversation
    // obtenu lors du matching.
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    async function loadConversations() {
    const res  = await fetch('/matching/mes-conversations', { headers: authHeaders() });
    const list = await res.json();
    const div  = document.getElementById('convList');

    if (!list.length) {
        div.innerHTML = `
          <div class="alert alert-info" style="font-size:0.82rem;">
            <i class="bi bi-info-circle me-1"></i>
            Aucune conversation active.<br>
            <a href="/matching" class="alert-link">Trouver des mentors →</a>
          </div>`;
        return;
    }

    div.innerHTML = list.map(c => `
    <div class="conv-item d-flex align-items-center gap-2"
         onclick="openConversation(${c.id_conversation}, '${c.partenaire.prenom} ${c.partenaire.nom}')">
        <div style="width:42px;height:42px;min-width:42px;border-radius:50%;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-weight:700;color:#7c3aed;font-size:0.9rem;">
            ${c.partenaire.prenom[0]}${c.partenaire.nom[0]}
        </div>
        <div style="overflow:hidden;">
            <div class="fw-600" style="font-size:0.88rem;">
                ${c.partenaire.prenom} ${c.partenaire.nom}
            </div>
            <div style="font-size:0.72rem;color:#6b7280;">
                ${c.partenaire.niveau || ''} – ${c.partenaire.filiere || ''}
            </div>
        </div>
    </div>
  `).join('');
}
loadConversations();

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // CHARGER LES MESSAGES → GET /messages/<id_conversation>
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    async function openConversation(convId, partnerName) {
      currentConvId = convId;
      document.getElementById('chatPartnerName').textContent = partnerName;
      document.getElementById('chatZone').style.display  = 'flex';
      document.getElementById('chatEmpty').style.display = 'none';

      if (pollInterval) clearInterval(pollInterval);
      await loadMessages();
      pollInterval = setInterval(loadMessages, 3000); // Rafraîchissement toutes les 3s
    }

    async function loadMessages() {
      if (!currentConvId) return;
      const res  = await fetch(`/messages/${currentConvId}`, { headers: authHeaders() });
      if (!res.ok) return;
      const msgs = await res.json();
      const box  = document.getElementById('chatMessages');
      box.innerHTML = msgs.map(m => `
        <div class="d-flex ${m.expediteur_id === currentUser?.id_user ? 'justify-content-end' : 'justify-content-start'}">
          <div class="chat-bubble ${m.expediteur_id === currentUser?.id_user ? 'me' : 'other'}">
            ${m.contenu}
            <div style="font-size:0.65rem;opacity:0.6;text-align:right;margin-top:2px;">
              ${new Date(m.date_envoi).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
            </div>
          </div>
        </div>
      `).join('');
      box.scrollTop = box.scrollHeight;
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // ENVOYER UN MESSAGE → POST /messages/<id_conversation>
    // Corps JSON : { contenu }
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    async function sendMessage() {
      const input   = document.getElementById('msgInput');
      const contenu = input.value.trim();
      if (!contenu || !currentConvId) return;

      input.value = '';
      const res = await fetch(`/messages/${currentConvId}`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ contenu })
      });
      if (res.ok) loadMessages();
    }

    document.getElementById('btnSend').addEventListener('click', sendMessage);
    document.getElementById('msgInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // Exposer openConversation globalement pour les boutons dynamiques
    window.openConversation = openConversation;
  </script>
  
</body>
</html>
