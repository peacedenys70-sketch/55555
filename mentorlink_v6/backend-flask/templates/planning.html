<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IFRI MentorLink – Planning</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/planning.css') }}" />
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <a href="/dashboard" class="sidebar-logo">
    <img src="/static/img/logo-mentorlink.png" alt="IFRI MentorLink" class="sidebar-logo-img" style="width:38px;height:38px;border-radius:10px;object-fit:cover;flex-shrink:0">
    <div><div class="sidebar-logo-text">IFRI MentorLink</div><div class="sidebar-logo-sub">UAC – Bénin</div></div>
  </a>
  <nav class="sidebar-nav">
    <div class="sidebar-section-label">Menu</div>
    <a href="/dashboard" class="nav-item-link"><i class="bi bi-grid-1x2 nav-icon"></i> Tableau de bord</a>
    <a href="/annonces"  class="nav-item-link"><i class="bi bi-megaphone nav-icon"></i> Annonces</a>
    <div class="sidebar-section-label">Social</div>
    <a href="/messages"  class="nav-item-link"><i class="bi bi-chat-dots nav-icon"></i> Messagerie</a>
    <a href="/matching"  class="nav-item-link"><i class="bi bi-people nav-icon"></i> Mes matchs</a>
    <a href="/planning"  class="nav-item-link active"><i class="bi bi-calendar-week nav-icon"></i> Planning</a>
    <div class="sidebar-section-label">Compte</div>
    <a href="/profil"    class="nav-item-link"><i class="bi bi-person-circle nav-icon"></i> Profil</a>
    <a href="#" id="logoutBtn" class="nav-item-link" style="color:#ef4444"><i class="bi bi-box-arrow-left nav-icon"></i> Déconnexion</a>
  </nav>
  <div class="sidebar-footer">
    <a href="/profil" class="sidebar-user">
      <div class="sidebar-avatar" id="sidebarAvatar">?</div>
      <div><div class="sidebar-user-name" id="sidebarName">…</div><div class="sidebar-user-role" id="sidebarRole"></div></div>
    </a>
  </div>
</aside>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- TOPBAR -->
<header class="topbar">
  <div class="d-flex align-items-center gap-3">
    <button class="topbar-hamburger" id="hamburgerBtn"><i class="bi bi-list"></i></button>
    <span class="topbar-title">Planning des disponibilités</span>
  </div>
</header>

<!-- CONTENU -->
<main class="main-content">
  <div id="alertMsg" class="d-none mb-3"></div>

  <!-- Ajouter un créneau -->
  <div class="card border-0 shadow-sm p-4 mb-4" style="border-radius:18px">
    <h6 class="fw-bold mb-3"><i class="bi bi-plus-circle me-2" style="color:#7c3aed"></i>Ajouter un créneau</h6>
    <div class="row g-3 align-items-end">
      <div class="col-sm-4">
        <label class="form-label fw-medium" style="font-size:.85rem">Jour</label>
        <select id="selJour" class="form-select">
          <option value="Lundi">Lundi</option>
          <option value="Mardi">Mardi</option>
          <option value="Mercredi">Mercredi</option>
          <option value="Jeudi">Jeudi</option>
          <option value="Vendredi">Vendredi</option>
          <option value="Samedi">Samedi</option>
          <option value="Dimanche">Dimanche</option>
        </select>
      </div>
      <div class="col-sm-3">
        <label class="form-label fw-medium" style="font-size:.85rem">Début</label>
        <input type="time" id="selDebut" class="form-control" value="08:00" />
      </div>
      <div class="col-sm-3">
        <label class="form-label fw-medium" style="font-size:.85rem">Fin</label>
        <input type="time" id="selFin" class="form-control" value="10:00" />
      </div>
      <div class="col-sm-2">
        <button class="btn btn-mentorlink w-100" id="btnAddDispo">
          <i class="bi bi-plus-lg me-1"></i>Ajouter
        </button>
      </div>
    </div>

    <!-- Créneaux rapides -->
    <div class="mt-3">
      <p class="fw-semibold mb-2" style="font-size:.82rem;color:#374151">Créneaux rapides :</p>
      <div class="d-flex flex-wrap gap-2">
        <button class="btn btn-sm btn-outline-secondary quick-slot" data-debut="08:00" data-fin="10:00">08h–10h</button>
        <button class="btn btn-sm btn-outline-secondary quick-slot" data-debut="10:00" data-fin="12:00">10h–12h</button>
        <button class="btn btn-sm btn-outline-secondary quick-slot" data-debut="13:00" data-fin="15:00">13h–15h</button>
        <button class="btn btn-sm btn-outline-secondary quick-slot" data-debut="15:00" data-fin="17:00">15h–17h</button>
        <button class="btn btn-sm btn-outline-secondary quick-slot" data-debut="17:00" data-fin="19:00">17h–19h</button>
        <button class="btn btn-sm btn-outline-secondary quick-slot" data-debut="19:00" data-fin="21:00">19h–21h</button>
      </div>
    </div>
  </div>

  <!-- Grille planning -->
  <div class="card border-0 shadow-sm p-4 mb-4" style="border-radius:18px">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h6 class="fw-bold mb-0"><i class="bi bi-calendar3 me-2" style="color:#7c3aed"></i>Mes disponibilités</h6>
      <div class="d-flex gap-2 align-items-center flex-wrap">
        <span class="badge" style="background:#ede9f8;color:#7c3aed;padding:.4rem .8rem"><span style="display:inline-block;width:10px;height:10px;background:#7c3aed;border-radius:3px;margin-right:5px"></span>Mes créneaux</span>
      </div>
    </div>

    <!-- Vue liste par jour -->
    <div id="planningListe">
      <div class="text-center text-muted py-4">
        <span class="spinner-border spinner-border-sm me-2"></span>Chargement…
      </div>
    </div>
  </div>

  <!-- Disponibilités d'un mentor -->
  <div class="card border-0 shadow-sm p-4" style="border-radius:18px">
    <h6 class="fw-bold mb-3"><i class="bi bi-person-check me-2" style="color:#7c3aed"></i>Voir les disponibilités d'un mentor</h6>
    <div class="d-flex gap-2 align-items-end">
      <div class="flex-grow-1">
        <label class="form-label fw-medium" style="font-size:.85rem">Sélectionner un mentor matché</label>
        <select id="selMentor" class="form-select">
          <option value="">— Choisir un mentor —</option>
        </select>
      </div>
      <button class="btn btn-outline-secondary" id="btnVoirMentor"><i class="bi bi-eye me-1"></i>Voir</button>
    </div>
    <div id="mentorDispos" class="mt-3"></div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (!localStorage.getItem('access_token')) window.location.href = '/login';

const authH = () => ({
  'Content-Type': 'application/json',
  'Authorization': `Bearer ${localStorage.getItem('access_token')}`
});

document.getElementById('hamburgerBtn').addEventListener('click', () =>
  document.getElementById('sidebar').classList.toggle('open'));
document.getElementById('sidebarOverlay').addEventListener('click', () =>
  document.getElementById('sidebar').classList.remove('open'));
document.getElementById('logoutBtn').addEventListener('click', e => {
  e.preventDefault(); localStorage.clear(); window.location.href = '/login';
});

function showAlert(msg, type='success') {
  const el = document.getElementById('alertMsg');
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  el.classList.remove('d-none');
  setTimeout(() => el.classList.add('d-none'), 3500);
}

// ── Charger sidebar user ───────────────────────────────────
fetch('/users/me', { headers: authH() }).then(r => r.json()).then(u => {
  const ini = ((u.prenom||'?')[0]+(u.nom||'?')[0]).toUpperCase();
  const sa  = document.getElementById('sidebarAvatar');
  if (u.photo) sa.innerHTML = `<img src="${u.photo}" alt="avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  else sa.textContent = ini;
  document.getElementById('sidebarName').textContent = `${u.prenom} ${u.nom}`;
  document.getElementById('sidebarRole').textContent = `${u.niveau} – ${u.filiere}`;
});

// ── Charger mes disponibilités ─────────────────────────────
async function loadDispos() {
  const res = await fetch('/disponibilites/me', { headers: authH() });
  if (!res.ok) return;
  const dispos = await res.json();
  renderListe(dispos);
}

const ORDRE_JOURS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

function renderListe(dispos) {
  const container = document.getElementById('planningListe');
  if (dispos.length === 0) {
    container.innerHTML = '<p class="text-muted text-center py-3">Aucune disponibilité. Ajoutez des créneaux ci-dessus.</p>';
    return;
  }

  // Grouper par jour
  const grouped = {};
  ORDRE_JOURS.forEach(j => { grouped[j] = []; });
  dispos.forEach(d => { if (grouped[d.jour]) grouped[d.jour].push(d); });

  container.innerHTML = ORDRE_JOURS
    .filter(j => grouped[j].length > 0)
    .map(jour => `
      <div class="mb-3">
        <div class="fw-semibold mb-2" style="font-size:.88rem;color:#374151">
          <i class="bi bi-calendar-day me-2" style="color:#7c3aed"></i>${jour}
        </div>
        <div class="d-flex flex-wrap gap-2">
          ${grouped[jour].map(d => `
            <span class="badge d-flex align-items-center gap-2"
              style="background:#ede9f8;color:#7c3aed;font-size:.82rem;font-weight:600;
                     border-radius:10px;padding:.45rem .85rem;border:1.5px solid #c4b5fd">
              <i class="bi bi-clock"></i> ${d.debut} – ${d.fin}
              <button onclick="deleteDispo(${d.id})" style="background:none;border:none;
                color:#7c3aed;cursor:pointer;padding:0;margin-left:4px;font-size:.85rem;line-height:1"
                title="Supprimer">
                <i class="bi bi-x-lg"></i>
              </button>
            </span>
          `).join('')}
        </div>
      </div>
    `).join('');
}

async function deleteDispo(id) {
  const res = await fetch(`/disponibilites/me/${id}`, { method: 'DELETE', headers: authH() });
  if (res.ok) { showAlert('Créneau supprimé.'); loadDispos(); }
  else showAlert('Erreur lors de la suppression.', 'danger');
}
window.deleteDispo = deleteDispo;

// ── Ajouter un créneau ─────────────────────────────────────
document.getElementById('btnAddDispo').addEventListener('click', async () => {
  const jour  = document.getElementById('selJour').value;
  const debut = document.getElementById('selDebut').value;
  const fin   = document.getElementById('selFin').value;

  if (!debut || !fin) { showAlert('Heure début et fin requises.', 'warning'); return; }
  if (fin <= debut)   { showAlert('Heure de fin doit être après l\'heure de début.', 'warning'); return; }

  const res  = await fetch('/disponibilites/me', {
    method: 'POST', headers: authH(),
    body: JSON.stringify({ jour, heure_debut: debut, heure_fin: fin })
  });
  const data = await res.json();
  if (res.ok || res.status === 200) { showAlert('Créneau ajouté !'); loadDispos(); }
  else showAlert(data.error || 'Erreur.', 'danger');
});

// Créneaux rapides
document.querySelectorAll('.quick-slot').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('selDebut').value = btn.dataset.debut;
    document.getElementById('selFin').value   = btn.dataset.fin;
  });
});

// ── Mentors matchés ────────────────────────────────────────
async function loadMentors() {
  const res = await fetch('/matching/mes-conversations', { headers: authH() });
  if (!res.ok) return;
  const convs = await res.json();
  const sel = document.getElementById('selMentor');
  convs.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.partenaire.id_user;
    opt.textContent = `${c.partenaire.prenom} ${c.partenaire.nom} (${c.partenaire.niveau} – ${c.partenaire.filiere})`;
    sel.appendChild(opt);
  });
}

document.getElementById('btnVoirMentor').addEventListener('click', async () => {
  const id = document.getElementById('selMentor').value;
  if (!id) { showAlert('Choisissez un mentor.', 'warning'); return; }

  const res = await fetch(`/disponibilites/user/${id}`, { headers: authH() });
  if (!res.ok) { showAlert('Impossible de charger les disponibilités.', 'danger'); return; }
  const dispos = await res.json();

  const container = document.getElementById('mentorDispos');
  if (dispos.length === 0) {
    container.innerHTML = '<p class="text-muted">Ce mentor n\'a pas encore renseigné ses disponibilités.</p>';
    return;
  }

  const grouped = {};
  ORDRE_JOURS.forEach(j => { grouped[j] = []; });
  dispos.forEach(d => { if (grouped[d.jour]) grouped[d.jour].push(d); });

  container.innerHTML = `
    <h6 class="fw-semibold mb-3" style="color:#374151">Disponibilités du mentor :</h6>
    ${ORDRE_JOURS.filter(j => grouped[j].length > 0).map(jour => `
      <div class="mb-2">
        <span class="fw-semibold" style="font-size:.85rem;color:#374151">${jour} :</span>
        ${grouped[jour].map(d => `
          <span class="badge ms-2" style="background:#d1fae5;color:#065f46;font-size:.8rem;
            border-radius:8px;padding:.35rem .7rem">
            <i class="bi bi-clock me-1"></i>${d.debut} – ${d.fin}
          </span>`).join('')}
      </div>
    `).join('')}
  `;
});

loadDispos();
loadMentors();
</script>
</body>
</html>
