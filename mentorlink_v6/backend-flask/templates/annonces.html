<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IFRI MentorLink – Annonces</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/annonces.css') }}" />
  <style>
  .skill-tag {
    display: inline-block;
    padding: 0.35em 0.85em;
    border-radius: 999px;
    border: 2px solid #7c3aed;
    color: #7c3aed;
    font-size: 0.8rem;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s;
    background: white;
  }
  .skill-tag.active {
    background: #7c3aed;
    color: white;
  }
  .skill-tag:hover {
    background: #ede9fe;
  }
</style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <a href="/dashboard" class="sidebar-logo">
      <img src="/static/img/logo-mentorlink.png" alt="IFRI MentorLink" class="sidebar-logo-img">
      <div><div class="sidebar-logo-text">IFRI MentorLink</div><div class="sidebar-logo-sub">UAC – Bénin</div></div>
    </a>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Menu</div>
      <a href="/dashboard" class="nav-item-link"><i class="bi bi-grid-1x2 nav-icon"></i> Tableau de bord</a>
      <a href="/annonces"  class="nav-item-link active"><i class="bi bi-megaphone nav-icon"></i> Annonces</a>
      <div class="sidebar-section-label">Social</div>
      <a href="/messages"  class="nav-item-link"><i class="bi bi-chat-dots nav-icon"></i> Messagerie</a>
      <a href="/matching"  class="nav-item-link"><i class="bi bi-people nav-icon"></i> Mes matchs</a>
      <a href="/planning"  class="nav-item-link"><i class="bi bi-calendar-week nav-icon"></i> Planning</a>
      <div class="sidebar-section-label">Compte</div>
      <a href="/profil"    class="nav-item-link"><i class="bi bi-person-circle nav-icon"></i> Profil</a>
      <a href="#" id="logoutBtn" class="nav-item-link" style="color:#ef4444;"><i class="bi bi-box-arrow-left nav-icon"></i> Déconnexion</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/profil" class="sidebar-user">
        <div class="sidebar-avatar" id="sidebarAvatar">?</div>
        <div>
          <div class="sidebar-user-name" id="sidebarName">…</div>
          <div class="sidebar-user-role" id="sidebarRole"></div>
        </div>
      </a>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <header class="topbar">
    <div class="d-flex align-items-center gap-3">
      <button class="topbar-hamburger" id="hamburgerBtn"><i class="bi bi-list"></i></button>
      <span class="topbar-title">Annonces</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-mentorlink btn-sm" data-bs-toggle="modal" data-bs-target="#modalAnnonce">
        <i class="bi bi-plus-lg me-1"></i>Nouvelle annonce
      </button>
    </div>
  </header>

  <main class="main-content">
    <div id="alertMsg" class="d-none mb-3"></div>

    <!-- Liste des annonces -->
    <div id="annoncesGrid" class="row g-3">
      <div class="col-12 text-center py-5 text-muted">
        <span class="spinner-border spinner-border-sm me-2"></span>Chargement des annonces…
      </div>
    </div>
  </main>

  <!-- Modal : Créer une annonce -->
  <div class="modal fade" id="modalAnnonce" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Nouvelle annonce</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="modalAlert" class="d-none mb-2"></div>
          <div class="mb-3">
            <label class="form-label fw-medium">Titre</label>
            <input type="text" id="anTitre" class="form-control" placeholder="Ex: Aide en Python" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium">Description</label>
            <textarea id="anDesc" class="form-control" rows="3" placeholder="Décrivez votre annonce…"></textarea>
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label fw-medium">Type</label>
              <select id="anType" class="form-select">
                <option value="OFFRE">Offre (je propose)</option>
                <option value="DEMANDE">Demande (j'ai besoin)</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label fw-medium">Format</label>
              <select id="anFormat" class="form-select">
                <option value="PRESENTIEL">Présentiel</option>
                <option value="EN_LIGNE">En ligne</option>
                <option value="HYBRIDE">Hybride</option>
              </select>
            </div>
          </div>
          <div class="mt-3">
            <label class="form-label fw-medium">Compétences concernées</label>
            <div class="d-flex flex-wrap gap-2" id="anCompTags">
              <span class="skill-tag" data-val="Python">Python</span>
              <span class="skill-tag" data-val="JavaScript">JavaScript</span>
              <span class="skill-tag" data-val="SQL">SQL</span>
              <span class="skill-tag" data-val="Algorithmique">Algorithmique</span>
              <span class="skill-tag" data-val="Réseaux">Réseaux</span>
              <span class="skill-tag" data-val="Machine Learning">ML</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Annuler</button>
          <button type="button" class="btn btn-mentorlink" id="btnCreateAnnonce">
            <span id="btnAnnonceText">Publier</span>
            <span id="btnAnnonceSpinner" class="d-none spinner-border spinner-border-sm"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    if (!localStorage.getItem('access_token')) window.location.href = '/login';

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('access_token')}` };
    }

    // Sidebar
    document.getElementById('hamburgerBtn').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
    document.getElementById('sidebarOverlay').addEventListener('click', () => document.getElementById('sidebar').classList.remove('open'));
    document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); localStorage.clear(); window.location.href = '/login'; });

    // Tags compétences
    document.querySelectorAll('#anCompTags .skill-tag').forEach(t => t.addEventListener('click', () => t.classList.toggle('active')));

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // CHARGER LES ANNONCES → GET /annonces/
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    async function loadAnnonces() {
      const res  = await fetch('/annonces/', { headers: authHeaders() });
      const list = await res.json();
      const grid = document.getElementById('annoncesGrid');

      if (!list.length) {
        grid.innerHTML = '<p class="text-center text-muted py-5">Aucune annonce active pour le moment.</p>';
        return;
      }

      const me = JSON.parse(localStorage.getItem('user') || '{}');
      grid.innerHTML = list.map(a => `
    <div class="col-md-6 col-lg-4">
      <div class="card h-100 shadow-sm border-0" style="border-radius:14px;border-left:4px solid ${a.type_annonce==='OFFRE'?'#7c3aed':'#f59e0b'} !important;">
        <div class="card-body d-flex flex-column">
          <div class="d-flex justify-content-between mb-2">
            <span class="badge" style="background:${a.type_annonce==='OFFRE'?'#ede9fe':'#fef3c7'};color:${a.type_annonce==='OFFRE'?'#7c3aed':'#d97706'};">${a.type_annonce}</span>
              <small class="text-muted">${new Date(a.date_creation).toLocaleDateString('fr-FR')}</small>
          </div>
          <h6 class="fw-700 mb-1">${a.titre}</h6>
          <p class="text-muted mb-2" style="font-size:0.82rem;">${a.description}</p>
          <div class="d-flex flex-wrap gap-1 mb-3">
          ${a.competences.map(c => `<span class="badge bg-light text-secondary" style="font-size:0.72rem;">${c}</span>`).join('')}
          </div>
          <div class="mt-auto pt-2 border-top d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center gap-2">
            <div style="width:30px;height:30px;border-radius:50%;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-weight:700;color:#7c3aed;font-size:0.75rem;">
              ${a.auteur.prenom[0]}${a.auteur.nom[0]}
            </div>
            <div>
              <div style="font-size:0.78rem;font-weight:600;">${a.auteur.prenom} ${a.auteur.nom}</div>
              <div style="font-size:0.7rem;color:#6b7280;">${a.auteur.niveau} – ${a.auteur.filiere}</div>
            </div>
          </div>
          ${a.auteur.id_user !== me.id_user ? `
          <button class="btn btn-sm btn-mentorlink" onclick="demanderMatch(${a.auteur.id_user}, '${a.auteur.prenom} ${a.auteur.nom}')"
            style="font-size:0.75rem;padding:0.3rem 0.75rem;border-radius:999px;">
            <i class="bi bi-person-plus me-1"></i>Matcher
          </button>` : `<span class="badge bg-secondary" style="font-size:0.7rem;">Mon annonce</span>`}
          </div>
        </div>
      </div>
    </div>
`).join('');
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // CRÉER UNE ANNONCE → POST /annonces/
    // Corps JSON : { titre, description, type_annonce, format, competences[] }
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    document.getElementById('btnCreateAnnonce').addEventListener('click', async () => {
      const titre = document.getElementById('anTitre').value.trim();
      const desc  = document.getElementById('anDesc').value.trim();
      const type  = document.getElementById('anType').value;
      const fmt   = document.getElementById('anFormat').value;
      const comps = [...document.querySelectorAll('#anCompTags .skill-tag.active')].map(t => t.dataset.val);
      const alertEl = document.getElementById('modalAlert');

      if (!titre || !desc) {
        alertEl.className = 'alert alert-danger';
        alertEl.textContent = 'Titre et description sont obligatoires.';
        alertEl.classList.remove('d-none');
        return;
      }

      document.getElementById('btnAnnonceText').classList.add('d-none');
      document.getElementById('btnAnnonceSpinner').classList.remove('d-none');

      const res = await fetch('/annonces/', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ titre, description: desc, type_annonce: type, format: fmt, competences: comps })
      });
      const data = await res.json();

      document.getElementById('btnAnnonceText').classList.remove('d-none');
      document.getElementById('btnAnnonceSpinner').classList.add('d-none');

      if (res.ok) {
        bootstrap.Modal.getInstance(document.getElementById('modalAnnonce')).hide();
        loadAnnonces();
      } else {
        alertEl.className = 'alert alert-danger';
        alertEl.textContent = data.error || 'Erreur lors de la publication.';
        alertEl.classList.remove('d-none');
      }
    });

    // Charger l'utilisateur pour la sidebar
    fetch('/users/me', { headers: authHeaders() }).then(r => r.json()).then(u => {
    localStorage.setItem('user', JSON.stringify(u));  // ← seule ligne ajoutée
      const _ini = ((u.prenom||'?')[0]+(u.nom||'?')[0]).toUpperCase();
      const _sa = document.getElementById('sidebarAvatar');
      if (u.photo) { _sa.innerHTML = `<img src="${u.photo}" alt="avatar">`; }
      else { _sa.textContent = _ini; }
      document.getElementById('sidebarName').textContent = `${u.prenom} ${u.nom}`;
      document.getElementById('sidebarRole').textContent = `${u.niveau} – ${u.filiere}`;
    });

    loadAnnonces();
    async function demanderMatch(mentorId, nom) {
      if (!confirm(`Envoyer une demande de mentoring à ${nom} ?`)) return;
      const res = await fetch('/matching/', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ mentor_id: mentorId })
      });
      const data = await res.json();
      if (res.ok) alert(`✅ Demande envoyée à ${nom} !`);
      else if (res.status === 409) alert('Une demande existe déjà avec cet utilisateur.');
      else alert(data.error || 'Erreur.');
    }
  </script>
</body>
</html>
